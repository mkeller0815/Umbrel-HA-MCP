version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ha-mcp-server_ui_1
      APP_PORT: 8086
      # MCP clients and the setup UI both connect without Umbrel auth cookies
      PROXY_AUTH_ADD: "false"

  ui:
    image: ghcr.io/mkeller0815/ha-mcp-setup-ui:latest@sha256:645cf7597c39c7ea25e120dde535f682ffef0b72e91068d8236b9500e8fe47ca
    restart: on-failure
    environment:
      HA_MCP_ENV_FILE: /data/.env
      HA_MCP_INTERNAL_URL: http://ha-mcp-server_server_1:8087
      LISTEN_PORT: "8086"
      HA_MCP_VERSION: "7.9.0"
      APP_VERSION: ${APP_VERSION}
    volumes:
      - ${APP_DATA_DIR}/data:/data

  server:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.9.0@sha256:eb7cf2349e4ad99d8a0a55447e8c67a942d35602d9cb455649ff0063de6dfa09
    restart: on-failure
    environment:
      HAMCP_ENV_FILE: /home/mcpuser/.ha-mcp/.env
      MCP_PORT: "8087"
    volumes:
      - ${APP_DATA_DIR}/data:/home/mcpuser/.ha-mcp
    # Wait for credentials to be saved via the setup UI before starting ha-mcp.
    # $$ escapes prevent Docker Compose from expanding shell variables.
    command:
      - sh
      - -c
      - |
        ENV_FILE=/home/mcpuser/.ha-mcp/.env
        while true; do
          token=$$(grep -s "^HOMEASSISTANT_TOKEN=" "$$ENV_FILE" | cut -d= -f2-)
          url=$$(grep -s "^HOMEASSISTANT_URL=" "$$ENV_FILE" | cut -d= -f2-)
          if [ -n "$$token" ] && [ -n "$$url" ]; then
            unset HOMEASSISTANT_URL HOMEASSISTANT_TOKEN
            exec ha-mcp-web
          fi
          echo "ha-mcp: waiting for credentials — open the app to configure your token"
          sleep 5
        done
