version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ha-mcp-server_ui_1
      APP_PORT: 8086
      # MCP clients and the setup UI both connect without Umbrel auth cookies
      PROXY_AUTH_ADD: "false"

  ui:
    image: ghcr.io/mkeller0815/ha-mcp-setup-ui:latest@sha256:40313436ca66c065be8801c96b3fd56d7bff3c674fa32780e9e8c5ffede4caf9
    restart: on-failure
    environment:
      HA_MCP_ENV_FILE: /data/.env
      HA_MCP_INTERNAL_URL: http://ha-mcp-server_server_1:8087
      LISTEN_PORT: "8086"
      HA_MCP_VERSION: "7.9.0"
      APP_VERSION: ${APP_VERSION}
    volumes:
      - ${APP_DATA_DIR}/data:/data

  server:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.9.0@sha256:eb7cf2349e4ad99d8a0a55447e8c67a942d35602d9cb455649ff0063de6dfa09
    restart: on-failure
    environment:
      HAMCP_ENV_FILE: /home/mcpuser/.ha-mcp/.env
      MCP_PORT: "8087"
    volumes:
      - ${APP_DATA_DIR}/data:/home/mcpuser/.ha-mcp
    # fastmcp-http.json hardcodes port 8086 and ignores MCP_PORT, so use the
    # ha-mcp-web entrypoint directly which respects MCP_PORT=8087
    command: ["ha-mcp-web"]
