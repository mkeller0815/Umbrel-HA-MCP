version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ha-mcp-server_server_1
      APP_PORT: 8086
      # MCP clients connect without Umbrel auth cookies
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.9.0@sha256:eb7cf2349e4ad99d8a0a55447e8c67a942d35602d9cb455649ff0063de6dfa09
    restart: on-failure
    environment:
      # Point ha-mcp at the .env file written by the pre-start hook
      HAMCP_ENV_FILE: /home/mcpuser/.ha-mcp/.env
    volumes:
      - ${APP_DATA_DIR}/data:/home/mcpuser/.ha-mcp
    command: ["fastmcp", "run", "fastmcp-http.json"]
    ports:
      - "8086:8086"
