manifestVersion: 1
id: ha-mcp-server
category: ai
name: Home Assistant MCP Server
version: "7.9.5"
tagline: Connect AI assistants to your Home Assistant via MCP
description: >-
  The Unofficial and Awesome Home Assistant MCP Server — a comprehensive Model
  Context Protocol (MCP) server that lets AI assistants like Claude, ChatGPT,
  and Gemini interact with your Home Assistant via the Model Context Protocol.


  Using natural language, control smart home devices, query entity states,
  execute services, and manage automations.


  **What you can do:**

  - Control lights, switches, climate, and all other devices

  - Query entity states and sensor data

  - Create and trigger automations

  - Execute Home Assistant services

  - Browse your full device and entity registry


  **Getting Started:**

  1. Make sure the Home Assistant app is installed on Umbrel (required
  dependency)

  2. Install and start this app

  3. Open the app — a setup page will appear

  4. Paste your Home Assistant long-lived access token (HA profile →
  Long-Lived Access Tokens → Create Token) and click Save

  5. Once connected, your MCP endpoint is http://umbrel.local:8086/mcp —
  point Claude Desktop, Claude Code, or any MCP-compatible client at that URL
releaseNotes: >-
  - Fixed: server no longer crash-loops when credentials are not yet configured;
  it now waits for you to save your token via the setup UI before starting

