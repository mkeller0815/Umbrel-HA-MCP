manifestVersion: 1
id: ha-mcp-server
category: ai
name: Home Assistant MCP Server
version: "7.9.0"
tagline: Connect AI assistants to your Home Assistant via MCP
description: >-
  The Unofficial and Awesome Home Assistant MCP Server — a comprehensive Model
  Context Protocol (MCP) server that lets AI assistants like Claude, ChatGPT,
  and Gemini interact with your Home Assistant via the Model Context Protocol.


  Using natural language, control smart home devices, query entity states,
  execute services, and manage automations.


  **What you can do:**

  - Control lights, switches, climate, and all other devices

  - Query entity states and sensor data

  - Create and trigger automations

  - Execute Home Assistant services

  - Browse your full device and entity registry


  **Getting Started:**

  1. Make sure the Home Assistant app is installed on Umbrel (it is a
  required dependency)

  2. Install and start this app — it auto-connects to your Umbrel Home
  Assistant at http://umbrel.local:8123

  3. Get a Home Assistant long-lived access token: HA profile → Long-Lived
  Access Tokens → Create Token

  4. Add the token to the config file at app-data/ha-mcp-server/data/.env
  on your Umbrel: HOMEASSISTANT_TOKEN=your_token_here

  5. Restart this app — your MCP endpoint is http://umbrel.local:8086/mcp

  6. Point Claude Desktop, Claude Code, or any MCP-compatible client at that
  URL
releaseNotes: >-
  Initial release packaging ha-mcp v7.9.0 for Umbrel.

